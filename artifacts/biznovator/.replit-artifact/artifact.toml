kind = "web"
previewPath = "/"
title = "Biznovator - Innovation Seeds Tomorrow"
version = "1.0.0"
id = "artifacts/biznovator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21501

[services.development]
run = "pnpm --filter @workspace/biznovator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biznovator", "run", "build" ]
publicDir = "artifacts/biznovator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21501"
BASE_PATH = "/"
